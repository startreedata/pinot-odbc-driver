# Builds and compile-validates the Power BI custom connector (.mez).
name: Power BI connector

on:
  pull_request:
    paths:
      - 'powerbi-connector/**'
      - '.github/workflows/powerbi-connector.yml'
  push:
    branches: [main]
    paths:
      - 'powerbi-connector/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & validate .mez
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # The .mez is a ZIP of the .pq + .pqm + icons; MSBuild's ZipDirectory
      # builds it cross-platform with no SDK dependency.
      - name: Build .mez
        run: dotnet msbuild powerbi-connector/PinotODBC.proj -t:BuildMez

      # Compile-validate the M with the Power Query SDK's PQTest tool (the same
      # tool the VS Code SDK uses), so connector syntax/type errors fail the
      # build. PQTest.exe — not MakePQX.exe, which has assembly-load issues when
      # run standalone — compiles the connector and the test query without
      # contacting a cluster.
      - name: Compile-validate (Power Query SDK / PQTest)
        shell: pwsh
        run: |
          nuget install Microsoft.PowerQuery.SdkTools -OutputDirectory "$env:RUNNER_TEMP\pqsdk" -ExcludeVersion
          $pqtest = Get-ChildItem -Path "$env:RUNNER_TEMP\pqsdk" -Recurse -Filter PQTest.exe |
            Select-Object -First 1
          if (-not $pqtest) { throw "PQTest.exe not found in the SdkTools package" }
          Write-Host "Using $($pqtest.FullName)"
          $mez = "powerbi-connector\bin\AnyCPU\Debug\PinotODBC.mez"
          & $pqtest.FullName compile --extension $mez --queryFile powerbi-connector\PinotODBC.query.pq
          if ($LASTEXITCODE -ne 0) { throw "PQTest compile failed with exit code $LASTEXITCODE" }

      - name: Upload .mez
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: powerbi-connector-mez
          path: powerbi-connector/bin/AnyCPU/Debug/PinotODBC.mez
          if-no-files-found: warn
